services:
  # Python FastAPI Backend Service (Free Instance)
  - type: web
    name: adra-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Next.js Frontend Web Service (Free Instance)
  - type: web
    name: adra-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false # Prompt in Render Dashboard to keep secret credentials out of Git
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: adra-backend
          property: host
